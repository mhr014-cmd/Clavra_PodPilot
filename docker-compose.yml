version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: clavra_db
    environment:
      POSTGRES_DB: clavra_prodpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clavra_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clavra_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/clavra_prodpilot
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clavra_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: clavra_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  redis_data:
